set_power:
  name: Définir la puissance
  description: Définit la puissance de sortie de la batterie StorCube.
  target:
    device:
      integration: storcube
  fields:
    power:
      name: Puissance
      description: Valeur de puissance de sortie (W).
      required: true
      example: 100
      selector:
        number:
          min: 0
          max: 10000
          step: 1
          mode: box
          unit_of_measurement: "W"


set_threshold:
  name: Définir le seuil
  description: Définit le seuil de réserve de la batterie.
  target:
    device:
      integration: storcube
  fields:
    threshold:
      name: Seuil
      description: Niveau minimum de batterie à conserver (%).
      required: true
      example: 10
      selector:
        number:
          min: 0
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"


check_firmware:
  name: Vérifier le firmware
  description: Vérifie si une mise à jour du firmware est disponible.
  target:
    device:
      integration: storcube
  fields:
    device_id:
      name: Device ID
      description: Identifiant de l'appareil StorCube (optionnel selon implémentation).
      required: false
      example: "storcube_001"
      selector:
        text:
