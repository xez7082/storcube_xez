# Service pour définir la puissance de sortie
set_power:
  name: Définir la puissance
  description: Définit la puissance de sortie de la batterie Storcube.
  target:
    device:
      integration: storcube  # Remplacez par le nom exact de votre domaine si différent
  fields:
    power:
      name: Puissance
      description: Valeur de la puissance de sortie souhaitée.
      required: true
      default: 100
      selector:
        number:
          min: 0
          max: 10000
          step: 1
          unit_of_measurement: W
          mode: box

# Service pour définir le seuil de décharge
set_threshold:
  name: Définir le seuil
  description: Définit le seuil de réserve (décharge) de la batterie.
  target:
    device:
      integration: storcube
  fields:
    threshold:
      name: Seuil
      description: Niveau de batterie minimum à conserver (0-100%).
      required: true
      default: 10
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

# Service pour vérifier les mises à jour de firmware
check_firmware:
  name: Vérifier le firmware
  description: Vérifie manuellement si une mise à jour est disponible.
  target:
    device:
      integration: storcube
